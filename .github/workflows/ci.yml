name: Automated Rule Sync & Generate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '0 23 * * *' # 07:00 Beijing time

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for pushing changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate internal rules
        run: python scripts/generate_rules.py

      - name: Sync external rules
        run: python scripts/fetch_external_rules.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: update generated rules [skip ci]"
          file_pattern: 'rules/*.txt subConvRules/externalList/*.list'
          branch: ${{ github.head_ref || github.ref_name }}
