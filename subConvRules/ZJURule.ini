[custom]

; ---------------------------------------------------------
; 规则集设置 (基于 jsDelivr 在线引用)
; 排序原则：域名规则在前，IP 规则在后，防止不必要的 DNS 解析与分流失效
; ---------------------------------------------------------

; 1. 高优先级直连域名 (Direct Domains)
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/applications.list
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/private.list
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/srcRules/ZJU-Rule.list
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/srcRules/ZJU.list
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/srcRules/ZJU-More-Scholar.list
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/srcRules/SelfDirect.list

; 2. 业务代理组域名 (Proxy Domains)
clash_rule_base=https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/ClashBase.yaml
ruleset=🫆 指纹浏览器,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/srcRules/FingerprintBrowser.list
ruleset=🛸 Antigravity IDE,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/srcRules/Antigravity.list
ruleset=🤖 ChatBot,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/openai.list
ruleset=🤖 ChatBot,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/srcRules/ChatBot.list
ruleset=📢 谷歌服务,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/google.list
ruleset=Ⓜ️ 微软服务,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/icloud.list
ruleset=🍎 苹果服务,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/apple.list

; 3. 广告过滤与隐私 (Reject Domains)
ruleset=🛑 广告过滤,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/reject.list

; 4. 电报消息 (Telegram - 包含大量 IP，放在中间以平衡优先级)
ruleset=📲 电报消息,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/telegramcidr.list

; 5. 通用代理域名 (Global Proxy Domains)
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/proxy.list
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/gfw.list
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/tld-not-cn.list

; 6. IP 段直连规则 (IP-CIDR - 放在最后以减少 DNS 解析压力)
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/srcRules/ZJU-IP.list
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/direct.list
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/lancidr.list
ruleset=🎯 全局直连,https://cdn.jsdelivr.net/gh/Bilerty/AdditionalRules/subConvRules/externalList/cncidr.list

; 7. 系统内置 GEOIP 与 最终规则
ruleset=🎯 全局直连,[]GEOIP,LAN
ruleset=🎯 全局直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; ---------------------------------------------------------
; 自定义策略组 (同步 GlobalScripts.js 逻辑)
; ---------------------------------------------------------
; 基础节点选择
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡(散列)`[]🔮 负载均衡(轮询)`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇰🇷 韩国节点`[]DIRECT
custom_proxy_group=♻️ 自动选择`url-test`(^(?!.*(ZJU|浙大|内网|✉️)).*)`http://www.google.com/generate_204`300
custom_proxy_group=🔯 故障转移`fallback`(^(?!.*(ZJU|浙大|内网|✉️)).*)`http://www.google.com/generate_204`300
custom_proxy_group=🔮 负载均衡(散列)`load-balance`(^(?!.*(ZJU|浙大|内网|✉️)).*)`http://www.google.com/generate_204`300,,consistent-hashing
custom_proxy_group=🔮 负载均衡(轮询)`load-balance`(^(?!.*(ZJU|浙大|内网|✉️)).*)`http://www.google.com/generate_204`300,,round-robin

