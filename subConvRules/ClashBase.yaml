# Clash Base Config (General Settings & DNS)
# This file is meant to be used as a base for subconverter

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
unified-delay: true
external-controller: 0.0.0.0:9090

dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true
  fake-ip-filter:
    - '*.lan'
    - 'localhost.ptlogin2.qq.com'
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.xboxlive.com'
    - 'msftconnecttest.com'
    - 'xbox.*.microsoft.com'
    - '*.prod.cloud.xbox.com.akamaized.net'
    - '+.battlenet.com.cn'
    - '+.wotgame.cn'
    - '+.wggames.cn'
    - '+.wowsgame.cn'
    - '+.wargaming.net'
    - 'proxy.golang.org'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - '+.n.n.srv.nintendo.net'
    - '+.stun.playstation.net'
    - 'xbox.*.*.microsoft.com'
    - '*.*.xboxlive.com'
    - 'speedtest.cnode.io'

  default-nameserver:
    - system
    - 223.6.6.6
    - 119.29.29.29
    - 8.8.8.8
    - 2400:3200::1
    - 2001:4860:4860::8888

  nameserver:
    - 10.10.0.21
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - https://dns.alidns.com/dns-query
    - https://danes.pub/dns-query

  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32
